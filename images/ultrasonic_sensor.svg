<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Blue PCB board -->
  <rect x="15" y="35" width="170" height="80" rx="6" fill="#1e40af" stroke="#1d4ed8" stroke-width="2" />
  
  <!-- Left Transducer "T" -->
  <circle cx="60" cy="75" r="32" fill="#9ca3af" stroke="#4b5563" stroke-width="2" />
  <circle cx="60" cy="75" r="28" fill="#e5e7eb" />
  <circle cx="60" cy="75" r="24" fill="#000" stroke="#f3f4f6" stroke-dasharray="3,3" />
  <text x="60" y="80" font-family="'Outfit', sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.8">T</text>
  
  <!-- Right Transducer "R" -->
  <circle cx="140" cy="75" r="32" fill="#9ca3af" stroke="#4b5563" stroke-width="2" />
  <circle cx="140" cy="75" r="28" fill="#e5e7eb" />
  <circle cx="140" cy="75" r="24" fill="#000" stroke="#f3f4f6" stroke-dasharray="3,3" />
  <text x="140" y="80" font-family="'Outfit', sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.8">R</text>
  
  <!-- Crystal Oscillator (Silver Oval) -->
  <rect x="92" y="45" width="16" height="8" rx="3" fill="#cfd8dc" stroke="#78909c" />
  
  <!-- 4-Pin Connection Header (Bottom) -->
  <rect x="85" y="105" width="30" height="10" fill="#111827" />
  <g fill="#f59e0b">
    <rect x="87" y="112" width="2" height="15" />
    <rect x="94" y="112" width="2" height="15" />
    <rect x="101" y="112" width="2" height="15" />
    <rect x="108" y="112" width="2" height="15" />
  </g>
  <text x="100" y="102" font-family="monospace" font-size="6" fill="#fff" text-anchor="middle">VCC TRIG ECHO GND</text>
</svg>
