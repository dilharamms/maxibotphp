<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Sky background -->
  <rect x="0" y="0" width="200" height="150" fill="#f0fdfa" rx="10" />
  
  <!-- Wi-Fi Waves -->
  <path d="M100 25 A 15 15 0 0 1 120 40" stroke="#029BA5" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5" />
  <path d="M100 18 A 25 25 0 0 1 133 40" stroke="#029BA5" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7" />
  <path d="M100 10 A 35 35 0 0 1 146 40" stroke="#029BA5" stroke-width="2" stroke-linecap="round" fill="none" />
  
  <!-- Wooden House Structure -->
  <!-- Roof -->
  <polygon points="50,60 100,25 150,60" fill="#ff7b00" rx="3" />
  <polygon points="53,60 100,28 147,60" fill="#ff9233" />
  
  <!-- Body -->
  <rect x="60" y="60" width="80" height="70" fill="#eab308" rx="2" />
  <rect x="65" y="65" width="70" height="65" fill="#fef08a" />
  
  <!-- Door -->
  <rect x="88" y="90" width="24" height="40" fill="#b45309" />
  <!-- Door knob (LED) -->
  <circle cx="94" cy="110" r="2" fill="#ef4444" />
  
  <!-- Window / LCD screen simulation -->
  <rect x="70" y="70" width="25" height="15" fill="#3b82f6" rx="2" stroke="#1d4ed8" stroke-width="1.5" />
  <rect x="73" y="73" width="19" height="9" fill="#93c5fd" />
  <line x1="75" y1="77" x2="90" y2="77" stroke="#1d4ed8" stroke-width="1" />
  
  <!-- Temperature/DHT sensor module on side -->
  <rect x="110" y="70" width="18" height="18" fill="#3b82f6" rx="2" />
  <g fill="#fff">
    <rect x="113" y="73" width="2" height="12" />
    <rect x="117" y="73" width="2" height="12" />
    <rect x="121" y="73" width="2" height="12" />
  </g>
  
  <!-- Wires & ESP32 connection simulation -->
  <path d="M100 130 C 100 145, 160 145, 160 120" stroke="#6568FE" stroke-width="2" fill="none" stroke-dasharray="3,3" />
  
  <!-- Small Microcontroller board on side -->
  <rect x="145" y="100" width="30" height="25" rx="3" fill="#6568FE" />
  <rect x="150" y="108" width="12" height="10" fill="#1e293b" />
  <circle cx="170" cy="105" r="2" fill="#22c55e" />
</svg>
