<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Background Board -->
  <rect x="35" y="15" width="130" height="120" rx="6" fill="#1f2937" />
  
  <!-- WiFi Antenna trace -->
  <path d="M45 25 L155 25" stroke="#e5e7eb" stroke-width="3" />
  <path d="M45 25 L45 35 L65 35 L65 25 L85 25 L85 35 L105 35 L105 25 L125 25 L125 35 L145 35 L145 25 L155 25" stroke="#f59e0b" stroke-width="2" fill="none" />
  
  <!-- Metal Shield ESP-WROOM-32 -->
  <rect x="55" y="45" width="90" height="55" rx="3" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1.5" />
  <rect x="62" y="52" width="76" height="41" fill="#b0bec5" />
  <text x="100" y="76" font-family="monospace" font-size="11" fill="#374151" text-anchor="middle" font-weight="bold">ESP32</text>
  
  <!-- USB Port -->
  <rect x="85" y="125" width="30" height="15" rx="2" fill="#90a4ae" />
  
  <!-- Pins headers on sides -->
  <g fill="#f59e0b">
    <!-- Left pins -->
    <rect x="25" y="30" width="10" height="4" />
    <rect x="25" y="40" width="10" height="4" />
    <rect x="25" y="50" width="10" height="4" />
    <rect x="25" y="60" width="10" height="4" />
    <rect x="25" y="70" width="10" height="4" />
    <rect x="25" y="80" width="10" height="4" />
    <rect x="25" y="90" width="10" height="4" />
    <rect x="25" y="100" width="10" height="4" />
    <rect x="25" y="110" width="10" height="4" />
    <rect x="25" y="120" width="10" height="4" />
    <!-- Right pins -->
    <rect x="165" y="30" width="10" height="4" />
    <rect x="165" y="40" width="10" height="4" />
    <rect x="165" y="50" width="10" height="4" />
    <rect x="165" y="60" width="10" height="4" />
    <rect x="165" y="70" width="10" height="4" />
    <rect x="165" y="80" width="10" height="4" />
    <rect x="165" y="90" width="10" height="4" />
    <rect x="165" y="100" width="10" height="4" />
    <rect x="165" y="110" width="10" height="4" />
    <rect x="165" y="120" width="10" height="4" />
  </g>
  
  <!-- Two small buttons -->
  <rect x="50" y="115" width="12" height="12" fill="#475569" rx="1" />
  <circle cx="56" cy="121" r="3" fill="#94a3b8" />
  <rect x="138" y="115" width="12" height="12" fill="#475569" rx="1" />
  <circle cx="144" cy="121" r="3" fill="#94a3b8" />
  
  <!-- Tiny red/blue LEDs -->
  <circle cx="70" cy="110" r="2.5" fill="#ef4444" />
  <circle cx="130" cy="110" r="2.5" fill="#3b82f6" />
</svg>
