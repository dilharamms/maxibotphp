<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Sky background -->
  <rect x="0" y="0" width="200" height="150" fill="#fefaf0" rx="10" />
  
  <!-- Base structure (wood texture colors) -->
  <rect x="40" y="115" width="120" height="15" rx="2" fill="#d97706" />
  <rect x="50" y="105" width="100" height="10" rx="1" fill="#b45309" />
  
  <!-- Turntable rotating gear -->
  <circle cx="100" cy="105" r="16" fill="#f59e0b" stroke="#78350f" stroke-width="1.5" stroke-dasharray="3,2" />
  
  <!-- Main boom/arm lower (wooden strut) -->
  <line x1="85" y1="105" x2="60" y2="55" stroke="#d97706" stroke-width="14" stroke-linecap="round" />
  <line x1="85" y1="105" x2="60" y2="55" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" />
  <!-- Screws/joints -->
  <circle cx="85" cy="105" r="4" fill="#6b7280" />
  <circle cx="60" cy="55" r="4" fill="#6b7280" />
  
  <!-- Secondary forearm upper (wooden strut) -->
  <line x1="60" y1="55" x2="120" y2="35" stroke="#b45309" stroke-width="10" stroke-linecap="round" />
  <line x1="60" y1="55" x2="120" y2="35" stroke="#d97706" stroke-width="6" stroke-linecap="round" />
  <!-- Joints -->
  <circle cx="120" cy="35" r="3" fill="#6b7280" />
  
  <!-- Claw assembly (Gripper) -->
  <!-- Gripper base -->
  <rect x="116" y="27" width="16" height="16" rx="2" fill="#78350f" transform="rotate(15 120 35)" />
  <!-- Upper claw finger -->
  <path d="M125 25 C 135 22, 145 28, 145 38" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" fill="none" />
  <!-- Lower claw finger -->
  <path d="M125 35 C 138 38, 143 45, 142 55" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" fill="none" />
  
  <!-- Syringe / Hydraulic controller simulation -->
  <line x1="95" y1="110" x2="70" y2="70" stroke="#3b82f6" stroke-width="3" opacity="0.6" />
  <rect x="68" y="66" width="6" height="10" fill="#93c5fd" stroke="#2563eb" stroke-dasharray="1" />
</svg>
