<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- PCB board -->
  <rect x="10" y="10" width="180" height="130" rx="10" fill="#029BA5" />
  <rect x="15" y="15" width="170" height="120" rx="8" fill="none" stroke="#007e86" stroke-width="2" />
  
  <!-- USB Port -->
  <rect x="5" y="25" width="35" height="25" rx="3" fill="#cfd8dc" stroke="#90a4ae" stroke-width="2" />
  <rect x="2" y="29" width="3" height="17" fill="#eceff1" />
  
  <!-- Power Jack -->
  <rect x="5" y="90" width="40" height="30" rx="4" fill="#374151" />
  <circle cx="25" cy="105" r="8" fill="#1f2937" />
  <circle cx="25" cy="105" r="4" fill="#000" />
  
  <!-- Main MCU ATmega328P -->
  <rect x="70" y="55" width="80" height="30" rx="2" fill="#111827" />
  <!-- Pins of MCU -->
  <g fill="#cfd8dc">
    <rect x="75" y="50" width="4" height="6" />
    <rect x="85" y="50" width="4" height="6" />
    <rect x="95" y="50" width="4" height="6" />
    <rect x="105" y="50" width="4" height="6" />
    <rect x="115" y="50" width="4" height="6" />
    <rect x="125" y="50" width="4" height="6" />
    <rect x="135" y="50" width="4" height="6" />
    <rect x="145" y="50" width="4" height="6" />
    <rect x="75" y="84" width="4" height="6" />
    <rect x="85" y="84" width="4" height="6" />
    <rect x="95" y="84" width="4" height="6" />
    <rect x="105" y="84" width="4" height="6" />
    <rect x="115" y="84" width="4" height="6" />
    <rect x="125" y="84" width="4" height="6" />
    <rect x="135" y="84" width="4" height="6" />
    <rect x="145" y="84" width="4" height="6" />
  </</g>
  <text x="110" y="73" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">ATMEGA328P</text>
  
  <!-- Pin Headers (Top & Bottom) -->
  <!-- Top header (Digital) -->
  <rect x="55" y="15" width="110" height="10" fill="#1f2937" />
  <g fill="#000">
    <circle cx="60" cy="20" r="2" />
    <circle cx="70" cy="20" r="2" />
    <circle cx="80" cy="20" r="2" />
    <circle cx="90" cy="20" r="2" />
    <circle cx="100" cy="20" r="2" />
    <circle cx="110" cy="20" r="2" />
    <circle cx="120" cy="20" r="2" />
    <circle cx="130" cy="20" r="2" />
    <circle cx="140" cy="20" r="2" />
    <circle cx="150" cy="20" r="2" />
    <circle cx="160" cy="20" r="2" />
  </g>
  
  <!-- Bottom header (Power & Analog) -->
  <rect x="60" y="125" width="90" height="10" fill="#1f2937" />
  <g fill="#000">
    <circle cx="65" cy="130" r="2" />
    <circle cx="75" cy="130" r="2" />
    <circle cx="85" cy="130" r="2" />
    <circle cx="95" cy="130" r="2" />
    <circle cx="105" cy="130" r="2" />
    <circle cx="115" cy="130" r="2" />
    <circle cx="125" cy="130" r="2" />
    <circle cx="135" cy="130" r="2" />
    <circle cx="145" cy="130" r="2" />
  </g>
  
  <!-- ICSP pins -->
  <rect x="170" y="65" width="12" height="18" fill="#1f2937" />
  <g fill="#cfd8dc">
    <circle cx="173" cy="70" r="1.5" />
    <circle cx="179" cy="70" r="1.5" />
    <circle cx="173" cy="74" r="1.5" />
    <circle cx="179" cy="74" r="1.5" />
    <circle cx="173" cy="78" r="1.5" />
    <circle cx="179" cy="78" r="1.5" />
  </g>
  
  <!-- Reset button -->
  <rect x="170" y="20" width="12" height="12" fill="#ef4444" rx="2" />
  <circle cx="176" cy="26" r="4" fill="#f87171" />
  
  <!-- Crystal Oscillator -->
  <rect x="45" y="55" width="15" height="8" rx="2" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1" />
  
  <!-- Screwholes -->
  <circle cx="20" cy="20" r="5" fill="none" stroke="#fff" stroke-width="1.5" />
  <circle cx="180" cy="130" r="5" fill="none" stroke="#fff" stroke-width="1.5" />
  
  <!-- Text Label -->
  <text x="110" y="112" font-family="'Outfit', sans-serif" font-size="12" fill="#ffffff" opacity="0.8" font-weight="bold">MaxiCore UNO</text>
</svg>
