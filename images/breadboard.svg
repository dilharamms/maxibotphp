<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- White board body -->
  <rect x="15" y="40" width="170" height="70" rx="4" fill="#fcfcfc" stroke="#e5e7eb" stroke-width="2" />
  
  <!-- Center separator line -->
