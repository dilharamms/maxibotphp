    <!-- Top power dots -->
    <circle cx="30" cy="49" r="1" /><circle cx="45" cy="49" r="1" /><circle cx="60" cy="49" r="1" /><circle cx="75" cy="49" r="1" /><circle cx="90" cy="49" r="1" /><circle cx="105" cy="49" r="1" /><circle cx="120" cy="49" r="1" /><circle cx="135" cy="49" r="1" /><circle cx="150" cy="49" r="1" /><circle cx="165" cy="49" r="1" />
    
