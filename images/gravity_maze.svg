<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Sky background -->
  <rect x="0" y="0" width="200" height="150" fill="#f5f3ff" rx="10" />
  
  <!-- Base Game Board Grid -->
  <polygon points="30,120 100,85 170,120 100,140" fill="#312e81" />
  <polygon points="34,118 100,88 166,118 100,136" fill="#4338ca" />
  
  <!-- Translucent Tower 1 (Blue) -->
  <g opacity="0.85">
    <rect x="55" y="45" width="25" height="60" fill="#1d4ed8" rx="2" />
    <rect x="58" y="48" width="19" height="54" fill="#60a5fa" />
    <!-- Grid segments in tower -->
    <line x1="55" y1="60" x2="80" y2="60" stroke="#1d4ed8" stroke-width="2" />
    <line x1="55" y1="75" x2="80" y2="75" stroke="#1d4ed8" stroke-width="2" />
    <line x1="55" y1="90" x2="80" y2="90" stroke="#1d4ed8" stroke-width="2" />
    <!-- Inside slider slope -->
    <line x1="58" y1="52" x2="77" y2="70" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Translucent Tower 2 (Green) -->
  <g opacity="0.85">
    <rect x="88" y="30" width="25" height="85" fill="#047857" rx="2" />
    <rect x="91" y="33" width="19" height="79" fill="#34d399" />
    <!-- Grid segments in tower -->
    <line x1="88" y1="50" x2="113" y2="50" stroke="#047857" stroke-width="2" />
    <line x1="88" y1="70" x2="113" y2="70" stroke="#047857" stroke-width="2" />
    <line x1="88" y1="90" x2="113" y2="90" stroke="#047857" stroke-width="2" />
    <!-- Inside slider slope -->
    <line x1="110" y1="56" x2="91" y2="80" stroke="#047857" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Translucent Tower 3 (Red) -->
  <g opacity="0.85">
    <rect x="120" y="55" width="25" height="50" fill="#b91c1c" rx="2" />
    <rect x="123" y="58" width="19" height="44" fill="#f87171" />
    <!-- Grid segments in tower -->
    <line x1="120" y1="70" x2="145" y2="70" stroke="#b91c1c" stroke-width="2" />
    <line x1="120" y1="85" x2="145" y2="85" stroke="#b91c1c" stroke-width="2" />
    <!-- Inside slider slope -->
    <line x1="123" y1="62" x2="142" y2="80" stroke="#b91c1c" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Red Marble Rolling -->
  <circle cx="106" cy="65" r="5" fill="#ef4444" />
  <circle cx="104" cy="63" r="2" fill="#fff" opacity="0.8" />
  <!-- Speed trail -->
  <path d="M112 50 C 114 55, 110 60, 107 63" stroke="#ef4444" stroke-width="1.5" fill="none" opacity="0.6" />
</svg>
