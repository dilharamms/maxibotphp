<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Red PCB board -->
  <rect x="25" y="25" width="150" height="100" rx="8" fill="#dc2626" stroke="#b91c1c" stroke-width="2" />
  
  <!-- Black Heatsink (Center) -->
  <rect x="75" y="35" width="50" height="40" rx="2" fill="#1f2937" />
  <!-- Fins on heatsink -->
  <g fill="#111827">
    <rect x="80" y="35" width="4" height="35" />
    <rect x="88" y="35" width="4" height="35" />
    <rect x="96" y="35" width="4" height="35" />
    <rect x="104" y="35" width="4" height="35" />
    <rect x="112" y="35" width="4" height="35" />
    <rect x="120" y="35" width="4" height="35" />
  </g>
  <rect x="70" y="70" width="60" height="8" rx="1" fill="#4b5563" />
  
  <!-- Screw Terminal Blocks (Green) -->
  <!-- Left motor terminal -->
  <rect x="20" y="55" width="15" height="25" rx="2" fill="#16a34a" />
  <circle cx="27" cy="62" r="3" fill="#cfd8dc" />
  <circle cx="27" cy="72" r="3" fill="#cfd8dc" />
  <!-- Right motor terminal -->
  <rect x="165" y="55" width="15" height="25" rx="2" fill="#16a34a" />
  <circle cx="172" cy="62" r="3" fill="#cfd8dc" />
  <circle cx="172" cy="72" r="3" fill="#cfd8dc" />
  <!-- Power Input terminal -->
  <rect x="85" y="112" width="30" height="15" rx="2" fill="#16a34a" />
  <circle cx="92" cy="120" r="3" fill="#cfd8dc" />
  <circle cx="100" cy="120" r="3" fill="#cfd8dc" />
  <circle cx="108" cy="120" r="3" fill="#cfd8dc" />
  
  <!-- Electrolytic Capacitors (Black Cylinders, top view circle) -->
  <circle cx="45" cy="45" r="10" fill="#374151" stroke="#e5e7eb" stroke-width="1.5" />
  <rect x="42" y="38" width="6" height="14" fill="#9ca3af" />
  
  <circle cx="155" cy="45" r="10" fill="#374151" stroke="#e5e7eb" stroke-width="1.5" />
  <rect x="152" y="38" width="6" height="14" fill="#9ca3af" />
  
  <!-- 5V/PWM Pin Headers -->
  <rect x="135" y="105" width="24" height="8" fill="#1f2937" />
  <g fill="#f59e0b">
    <circle cx="138" cy="109" r="1.5" />
    <circle cx="143" cy="109" r="1.5" />
    <circle cx="148" cy="109" r="1.5" />
    <circle cx="153" cy="109" r="1.5" />
    <circle cx="157" cy="109" r="1.5" />
  </g>
</svg>
