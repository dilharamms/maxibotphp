<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Sky background -->
  <rect x="0" y="0" width="200" height="150" fill="#f8fafc" rx="10" />
  
  <!-- Jumper Wires Curves -->
  <!-- Red wire -->
  <path d="M 30,30 C 50,60 80,120 170,120" stroke="#ef4444" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- Orange wire -->
  <path d="M 35,30 C 55,60 85,115 170,113" stroke="#f97316" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- Yellow wire -->
  <path d="M 40,30 C 60,60 90,110 170,106" stroke="#eab308" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- Green wire -->
  <path d="M 45,30 C 65,60 95,105 170,99" stroke="#22c55e" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- Blue wire -->
  <path d="M 50,30 C 70,60 100,100 170,92" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- Purple wire -->
  <path d="M 55,30 C 75,60 105,95 170,85" stroke="#a855f7" stroke-width="6" stroke-linecap="round" fill="none" />
  
  <!-- Black header connector tips - Left side -->
  <rect x="22" y="24" width="36" height="12" rx="1" fill="#1f2937" transform="rotate(56 30 30)" />
  <g fill="#cfd8dc" stroke="#6b7280" stroke-width="0.5">
    <rect x="23" y="12" width="2" height="12" transform="rotate(56 30 30)" />
    <rect x="28" y="12" width="2" height="12" transform="rotate(56 30 30)" />
    <rect x="33" y="12" width="2" height="12" transform="rotate(56 30 30)" />
    <rect x="38" y="12" width="2" height="12" transform="rotate(56 30 30)" />
    <rect x="43" y="12" width="2" height="12" transform="rotate(56 30 30)" />
    <rect x="48" y="12" width="2" height="12" transform="rotate(56 30 30)" />
  </g>
  
  <!-- Black header connector tips - Right side -->
  <rect x="160" y="78" width="12" height="48" rx="1" fill="#1f2937" />
  <g fill="#cfd8dc" stroke="#6b7280" stroke-width="0.5">
    <rect x="172" y="81" width="12" height="2" />
    <rect x="172" y="88" width="12" height="2" />
    <rect x="172" y="95" width="12" height="2" />
    <rect x="172" y="102" width="12" height="2" />
    <rect x="172" y="109" width="12" height="2" />
    <rect x="172" y="116" width="12" height="2" />
  </g>
</svg>
